services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ragbot
      POSTGRES_USER: ragbot
      POSTGRES_PASSWORD: ragbot
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ragbot -d ragbot"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    environment:
      DATABASE_URL: postgres://ragbot:ragbot@postgres:5432/ragbot?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgres://ragbot:ragbot@postgres:5432/ragbot?sslmode=disable
      JWT_SECRET: local-dev-secret
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: local-password
      HTTP_PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgres://ragbot:ragbot@postgres:5432/ragbot?sslmode=disable
      JWT_SECRET: local-dev-secret
      SERVICE_NAME: rag-bot-worker
      PROVIDER_MODE: mock
    depends_on:
      migrate:
        condition: service_completed_successfully

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    environment:
      API_BASE_URL: http://api:8080
    ports:
      - "8501:8501"
    depends_on:
      - api

volumes:
  postgres-data:
