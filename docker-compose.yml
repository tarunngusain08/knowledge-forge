name: knowledge-forge

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: knowledge_forge
      POSTGRES_USER: knowledge_forge
      POSTGRES_PASSWORD: knowledge_forge
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowledge_forge -d knowledge_forge"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    environment:
      DATABASE_URL: postgres://knowledge_forge:knowledge_forge@postgres:5432/knowledge_forge?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgres://knowledge_forge:knowledge_forge@postgres:5432/knowledge_forge?sslmode=disable
      JWT_SECRET: local-dev-secret
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: local-password
      HTTP_PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgres://knowledge_forge:knowledge_forge@postgres:5432/knowledge_forge?sslmode=disable
      JWT_SECRET: local-dev-secret
      SERVICE_NAME: knowledge-forge-worker
      PROVIDER_MODE: mock
    depends_on:
      migrate:
        condition: service_completed_successfully

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
      args:
        VITE_API_BASE_URL: http://localhost:8080
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "8501:8501"
    depends_on:
      - api

volumes:
  postgres-data:
